<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>Exercícios de tabela</h1>
    <table height="400px" width="400px">
        <tr>
            <td colspan="4" bgcolor="green"></td>
        </tr>
        <tr>
            <td colspan="2" bgcolor="darkblue" width="50%"></td>
            <td colspan="2" bgcolor="yellow" width="50%"></td>
        </tr>
        <tr>
            <td bgcolor="lightgreen" width="25%"></td>
            <td colspan="3" bgcolor="red" width="75%"></td>
        </tr>
        <tr>
            <td bgcolor="aqua" width="25%"></td>
            <td colspan="2" bgcolor="pink" width="50%"></td>
            <td bgcolor="aqua" width="25%"></td>
        </tr>
        <tr>
            <td colspan="3" bgcolor="purple" width="75%"></td>
            <td bgcolor="lightgreen" width="25%"></td>
        </tr>
    </table>

    <br>

    <table height="400px" width="500px">
        <tr>
            <td rowspan="4" bgcolor="green" height="400px"></td>
            <td rowspan="2" bgcolor="yellow" height="200px"></td>
            <td rowspan="3" bgcolor="red" height="300px"></td>
            <td bgcolor="cyan"height="100px"></td>
            <td bgcolor="lightgreen" height="100px"></td></td>
        </tr>
        <tr>
            <td rowspan="2" bgcolor="pink" height="200px"></td>
            <td rowspan="3" bgcolor="purple" height="300px"></td>
        </tr>
        <tr>
            <td rowspan="2" bgcolor="darkblue" height="200px"></td>
        </tr>
        <tr>
            <td bgcolor="lightgreen" height="100px"></td>
            <td bgcolor="cyan" height="100px"></td>
        </tr>
    </table>
    <br>

    <table height="500px" width="400px">
        <tr>
            <td colspan="2" bgcolor="pink" width="200px"></td>
            <td colspan="2" rowspan="2" bgcolor="blue" width="200px" height="200px"></td>
        </tr>
        <tr>
            <td colspan="2" bgcolor="purple" width="200px"></td>
        </tr>
        <tr>
            <td colspan="4" bgcolor="red" width="400px" height="100px"></td>
        </tr>
        <tr>
            <td rowspan="2" bgcolor="lightgreen" width="100px" height="200px"></td>
            <td rowspan="2" bgcolor="yellow" width="100px" height="200px"></td>
            <td colspan="2" bgcolor="orange" width="200px"></td>
        </tr>
        <tr>
            <td bgcolor="pink" width="100px"></td>
            <td bgcolor="cinza" width="100px"></td>
        </tr>
    </table>
    <br>
    <table height="700px" width="400px">
        <tr>
            <td colspan="4" bgcolor="red" height="100px" width="400px"></td>
        </tr>
        <tr>
            <td colspan="2" rowspan="3" bgcolor="blue" height="300px" width="200px"></td>
            <td colspan="2" bgcolor="orange" height="100px" width="200px"></td>
        </tr>
        <tr>
            <td colspan="2" bgcolor="yellow" height="100px" width="200px"></td>
        </tr>
        <tr>
            <td colspan="2" bgcolor="orange" height="100px" width="200px"></td>
        </tr>
        <tr>
            <td colspan="3" bgcolor="green" height="100px" width="300px"></td>
            <td rowspan="3" bgcolor="cyan" height="300px" width="100px"></td>
        </tr>
        <tr>
            <td bgcolor="purple" height="100px" width="100px"></td>
            <td rowspan="2" bgcolor="gray" height="200px" width="100px"></td>
            <td bgcolor="darkgreen" height="100px" width="100px"></td>
        </tr>
        <tr>
            <td bgcolor="cyan" height="100px" width="100px"></td>
            <td bgcolor="pink" height="100px" width="100px"></td>
        </tr>
    </table>
</body>

</html>
