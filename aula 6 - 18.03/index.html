<body>

        </tr>
        <tr>

        </tr>

            <td bgcolor="aqua" width="25%"></td>
            <td colspan="2" bgcolor="red" width="50%"></td>
            <td bgcolor="aqua" width="25%"></td>
        </tr>
        <tr>
            <td colspan="3" bgcolor="purple" width="75%"></td>

        </tr>
    </table>
