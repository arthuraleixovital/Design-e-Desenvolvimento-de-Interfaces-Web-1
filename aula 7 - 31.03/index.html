<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <table height="500px" width="1000px">
        <tr>
            <td rowspan="2" bgcolor="red" height="200px" width="100px"></td>
            <td colspan="6" bgcolor="green" height="100px" width="700px"></td>
            <td colspan="2" bgcolor="darkblue" height="100px" width="200px"></td>
        </tr>
        <tr>
            <td rowspan="3" bgcolor="cyan" height="300px" width="100px"></td>
            <td rowspan="2" colspan="8" bgcolor="yellow" height="200px" width="800px"></td>
        </tr>
        <tr>
            <td rowspan="3" bgcolor="orange" height="300px" width="100px"></td>
        </tr>
        <tr>
            <td rowspan="2" colspan="2" bgcolor="purple" height="200px" width="300px"></td>
            <td rowspan="2" colspan="2" bgcolor="darkblue" height="200px" width="200px"></td>
            <td rowspan="2" colspan="2" bgcolor="purple" height="200px" width="300px"></td>
        </tr>
        <tr>
            <td bgcolor="white" height="100px" width="100px"></td>
        </tr>
    </table>
</body>
</html>
