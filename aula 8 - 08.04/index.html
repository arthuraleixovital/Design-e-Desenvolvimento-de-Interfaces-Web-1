<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* Seletor { bloco de configuração=> atributo:valor; } */
        /* Seletor global => * */
        *{color:green}
        /* Seletor TAG HTML */
        h2{color: yellow;}
        /* Seletor por ID */
        #cssMaldito{color: red;}
    </style>
</head>
<body>
    <!-- CSS Inline-->
     <!-- <h1 style='color: red;'>Introdução ao CSS</h1>-->
      <!-- CSS Interno-->
       <h1>Introdução ao CSS</h1>
       <h2>CSS interno</h2>
       <p>É o CSS que fica no mesmo arquivo que o HTML0</p>
       <h2>CSS Inline</h2>
       <p>É o CSS que fica dentro da TAG, como um atributo.</p>
       <h2>CSS Externo</h2>
       <p>É o que fica em outro arquivo, podendo até mesmo estar em outro servidor.</p>

       <h2>Tipos de CSS</h2>
</body>
</html>
