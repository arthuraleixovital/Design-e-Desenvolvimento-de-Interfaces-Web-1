<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Aula de CSS</h1>
    <h2>Definição de CSS</h2>
    <p>CSS significa folha de estilo em cascata</p>
    <h2>Tipos de CSS</h2>
    <h3>CSS inline</h3>
    <p>Fica alocado dentro da TAG HTML.</p>
    <h3 class="textoAmarelo">CSS interno</h3>
    <p>Fica alocado no bloco style dentro do <b>head</b> no HTML.</p>
    <h3 class="textoAmarelo">CSS externo</h3>
    <p>Usa-se um arquivo separado do HTML.</p>

    <div>
        <div id="filha"></div>
        <div class="bola"></div>
        <div class="a"></div>
        <div class="b"></div>
        <div class="c"></div>
        <div class="d"></div>
        <div class="e"></div>
        <div class="f"></div>
    </div>
</body>
</html>
